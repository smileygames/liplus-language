# Li+ Pre-PR Skeleton Workflow
#
# This file defines the execution boundary.
# It is intentionally minimal.
#
# - Do NOT add logic here.
# - Do NOT generate this file via AI.
# - This workflow exists only as a boundary.
#
# Logic belongs to generated artifacts,
# not to this skeleton.
# ============================================

name: Li+ Pre-PR Skeleton

on:
  push:
    # 実験用ブランチだけで発火させる
    branches:
      - issue-pre-pr-actions

jobs:
  boundary-proof:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Boundary proof (no-op)
        run: |
          echo "Li+ pre-PR skeleton is active."
          echo "No operation is performed here."

      - name: Apply Li+ patch
        run: |
          chmod +x .github/scripts/apply_patch.sh
          .github/scripts/apply_patch.sh

      - name: Commit Li+ changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
          else
            git config user.name "li-plus-bot"
            git config user.email "li-plus@users.noreply.github.com"
            git add Li+.md
            git commit -m "Apply Li+ patch"
          fi

      - name: Base64 encode / decode test
        run: |
          ls -R .
          base64 actions-test/sample.txt > encoded.txt
          base64 -d encoded.txt > decoded.txt
          diff actions-test/sample.txt decoded.txt
