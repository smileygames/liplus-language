name: Li+ PR Agent

on:
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

jobs:
  pr-agent:
    if: |
      (github.event_name == 'pull_request_review' && !github.event.pull_request.merged) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && github.event.issue.state == 'open' && github.event.comment.user.login != 'liplus-lin-lay' && github.event.comment.user.login != 'github-actions[bot]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN || github.token }}

      - name: Configure git and checkout PR branch
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PAT: ${{ secrets.GH_TOKEN || github.token }}
        run: |
          git config user.name "liplus-lin-lay"
          git config user.email "liplus-lin-lay@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${PAT}@github.com/${{ github.repository }}.git"
          if [ -n "$PR_HEAD_REF" ]; then
            git fetch origin "$PR_HEAD_REF" 2>/dev/null || true
            git checkout "$PR_HEAD_REF" 2>/dev/null || echo "Branch $PR_HEAD_REF not found (PR may be merged)"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run PR agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          # pull_request_review
          PR_NUMBER_REVIEW: ${{ github.event.pull_request.number }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          REVIEW_STATE: ${{ github.event.review.state }}
          REVIEW_BODY: ${{ github.event.review.body }}
          REVIEWER: ${{ github.event.review.user.login }}
          # issue_comment (on PR)
          PR_NUMBER_COMMENT: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENTER: ${{ github.event.comment.user.login }}
          CLAUDE_MODEL: claude-sonnet-4-6
        run: python .github/scripts/liplus_pr_agent.py
