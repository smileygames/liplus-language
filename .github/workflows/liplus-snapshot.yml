name: CD - snapshot tag

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA to tag'
        required: true

permissions:
  contents: write

concurrency:
  group: cd-snapshot-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  tag:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target SHA
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "sha=${{ inputs.sha }}" >> $GITHUB_OUTPUT
          else
            echo "sha=${{ github.event.pull_request.merge_commit_sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.sha }}
          fetch-depth: 0

      - name: Create build tag (JST date + sequence)
        env:
          TARGET_SHA: ${{ steps.resolve.outputs.sha }}
        run: |
          set -euo pipefail

          # Ensure tags are available locally
          git fetch --tags --force

          # JST date
          DATE="$(TZ=Asia/Tokyo date +%Y-%m-%d)"
          PREFIX="build-${DATE}."

          echo "Resolving next sequence for ${PREFIX}* (JST)"

          # Find max existing sequence number for today's prefix
          max_seq="$(
            git tag -l "${PREFIX}[0-9]*" \
              | sed -E "s/^${PREFIX}//" \
              | sort -n \
              | tail -1
          )"

          # Default when no tag exists
          : "${max_seq:=0}"

          next_seq=$((max_seq + 1))
          TAG="${PREFIX}${next_seq}"

          echo "Tagging ${TAG} at ${TARGET_SHA}"
          git tag "${TAG}" "${TARGET_SHA}"
          git push origin "${TAG}"
